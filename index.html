<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brainy Wallet - Application</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET ET STRUCTURE DE BASE --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Supprime le flash bleu au clic sur mobile */
        }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Empêche le scroll sur la page principale */
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f6ff;
        }

        /* --- ZONE DE CONTENU (IFRAME) --- */
        #app-frame {
            width: 100%;
            /* La hauteur prend tout l'écran moins la hauteur de la barre de navigation (65px) */
            height: calc(100% - 65px);
            border: none;
            display: block;
            background-color: #f0f6ff;
        }

        /* --- BARRE DE NAVIGATION EN BAS --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px; /* Hauteur de base */
            background: #ffffff;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
            /* Padding dynamique pour les écrans sans bordures (ex: iPhone X et +) */
            padding-bottom: env(safe-area-inset-bottom); 
        }

        /* --- BOUTONS DE NAVIGATION --- */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8a92b2;
            cursor: pointer;
            width: 100%;
            height: 100%;
            transition: all 0.3s ease;
            user-select: none; /* Empêche la sélection du texte au double clic */
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: transform 0.2s ease, color 0.3s ease;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }

        /* --- ÉTAT ACTIF (Page sélectionnée) --- */
        .nav-item.active {
            color: #007bff;
        }

        .nav-item.active i {
            transform: translateY(-2px) scale(1.1); /* Petit effet de soulèvement */
            color: #007bff;
        }

    </style>
</head>
<body>

    <iframe id="app-frame" src="index.html"></iframe>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigate('index.html', this)">
            <i class="fa-solid fa-house"></i>
            <span>Accueil</span>
        </div>
        
        <div class="nav-item" onclick="navigate('action.html', this)">
            <i class="fa-solid fa-chart-line"></i>
            <span>Actions</span>
        </div>
        
        <div class="nav-item" onclick="navigate('trading.html', this)">
            <i class="fa-solid fa-chart-candlestick"></i>
            <span>Trading</span>
        </div>
        
        <div class="nav-item" onclick="navigate('crash.html', this)">
            <i class="fa-solid fa-rocket"></i>
            <span>Crash</span>
        </div>
        
        <div class="nav-item" onclick="navigate('jeu.html', this)">
            <i class="fa-solid fa-gift"></i>
            <span>Tombola</span>
        </div>
    </nav>

    <script>
        function navigate(page, element) {
            // 1. Changer la source de l'iframe
            document.getElementById('app-frame').src = page;
            
            // 2. Retirer la classe 'active' de tous les boutons
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                item.classList.remove('active');
            });
            
            // 3. Ajouter la classe 'active' au bouton cliqué
            element.classList.add('active');
        }
    </script>

</body>
</html>
